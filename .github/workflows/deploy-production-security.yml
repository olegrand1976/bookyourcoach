name: 🚀 Déploiement GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Ignorer le build (déployer seulement)'
        required: false
        default: 'false'
        type: boolean
      skip_deploy:
        description: 'Ignorer le déploiement (build seulement)'
        required: false
        default: 'false'
        type: boolean
      force_rebuild:
        description: 'Forcer la reconstruction des images'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT: premedica-prod-2025
  GCP_REGION: europe-west9
  AR_HOST: europe-west1-docker.pkg.dev
  AR_REPO: europe-west1-docker.pkg.dev/premedica-prod-2025/bookyourcoach
  API_SERVICE: bookyourcoach-api-prod
  WEB_SERVICE: bookyourcoach-web-prod
  MIGRATE_JOB: bookyourcoach-migrate

jobs:
  # ─── 1. Préparation ───────────────────────────────────────────────────────
  prepare:
    name: 🔍 Préparation & Validation
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      image_tag: ${{ steps.check.outputs.image_tag }}

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔍 Conditions
      id: check
      run: |
        SKIP_BUILD="${{ inputs.skip_build }}"
        SKIP_DEPLOY="${{ inputs.skip_deploy }}"
        FORCE_REBUILD="${{ inputs.force_rebuild }}"

        [[ "$SKIP_BUILD" == "true" ]]   && echo "should_build=false" >> $GITHUB_OUTPUT \
                                        || echo "should_build=true"  >> $GITHUB_OUTPUT
        [[ "$SKIP_DEPLOY" == "true" ]]  && echo "should_deploy=false" >> $GITHUB_OUTPUT \
                                        || echo "should_deploy=true"  >> $GITHUB_OUTPUT

        if [[ "$FORCE_REBUILD" == "true" ]]; then
          echo "image_tag=force-$(date +%s)" >> $GITHUB_OUTPUT
        else
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

  # ─── 2. Vérification sécurité ─────────────────────────────────────────────
  security-check:
    name: 🔒 Vérification Sécurité
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔍 Fichiers + syntaxe PHP
      run: |
        for f in \
          "app/Http/Controllers/Api/AdminController.php" \
          "app/Http/Controllers/Api/TeacherController.php" \
          "app/Http/Controllers/Api/StudentController.php" \
          "routes/api.php" \
          "bootstrap/app.php"; do
          if [ -f "$f" ]; then
            echo "✅ $f"
            php -l "$f"
          else
            echo "❌ Manquant : $f" && exit 1
          fi
        done

        manual_auth=$(grep -c "request()->header('Authorization')" routes/api.php || echo "0")
        role_checks=$(grep -c "role !== 'admin'" routes/api.php || echo "0")
        [ "$manual_auth" -gt 0 ] && echo "❌ Auth manuelle détectée" && exit 1
        [ "$role_checks" -gt 0 ] && echo "❌ Vérification de rôle en dur détectée" && exit 1
        echo "✅ Sécurité OK (auth_manuelle=$manual_auth role_checks=$role_checks)"

  # ─── 3. Build + push Artifact Registry ───────────────────────────────────
  build-images:
    name: 🏗️ Build → Artifact Registry
    runs-on: ubuntu-latest
    needs: [prepare, security-check]
    if: needs.prepare.outputs.should_build == 'true'

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔑 Auth GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY_BYC }}

    - name: 🐳 Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Configure Docker → Artifact Registry
      run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

    - name: 🏗️ Build + push Backend (Laravel)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.AR_REPO }}/api:latest
          ${{ env.AR_REPO }}/api:${{ needs.prepare.outputs.image_tag }}
        cache-from: type=gha,scope=byc-backend
        cache-to: type=gha,mode=max,scope=byc-backend

    - name: 🎨 Build + push Frontend (Nuxt)
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.AR_REPO }}/web:latest
          ${{ env.AR_REPO }}/web:${{ needs.prepare.outputs.image_tag }}
        cache-from: type=gha,scope=byc-frontend-${{ hashFiles('frontend/**') }}
        cache-to: type=gha,mode=max,scope=byc-frontend-${{ hashFiles('frontend/**') }}

    - name: 📋 Résumé build
      run: |
        echo "✅ Images poussées :"
        echo "  API : ${{ env.AR_REPO }}/api:${{ needs.prepare.outputs.image_tag }}"
        echo "  Web : ${{ env.AR_REPO }}/web:${{ needs.prepare.outputs.image_tag }}"

  # ─── 4. Déploiement Cloud Run ─────────────────────────────────────────────
  deploy:
    name: 🚀 Cloud Run Deploy
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    if: needs.prepare.outputs.should_deploy == 'true'

    steps:
    - name: 🔑 Auth GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY_BYC }}

    - name: ⚙️ Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: 🚀 Deploy API (Laravel)
      run: |
        gcloud run deploy ${{ env.API_SERVICE }} \
          --image="${{ env.AR_REPO }}/api:${{ needs.prepare.outputs.image_tag }}" \
          --region=${{ env.GCP_REGION }} \
          --project=${{ env.GCP_PROJECT }} \
          --port=80 \
          --quiet

    - name: 🎨 Deploy Web (Nuxt)
      run: |
        gcloud run deploy ${{ env.WEB_SERVICE }} \
          --image="${{ env.AR_REPO }}/web:${{ needs.prepare.outputs.image_tag }}" \
          --region=${{ env.GCP_REGION }} \
          --project=${{ env.GCP_PROJECT }} \
          --port=3000 \
          --quiet

    - name: 📦 Migrations (Cloud Run Job)
      run: |
        IMAGE="${{ env.AR_REPO }}/api:${{ needs.prepare.outputs.image_tag }}"
        ENV_FILE="/tmp/byc-migrate-env.yaml"
        printf '%s\n' \
          "APP_ENV: production" \
          "APP_DEBUG: \"false\"" \
          "DB_CONNECTION: mysql" \
          "DB_SOCKET: \"/cloudsql/${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:ll-it-mysql\"" \
          "DB_DATABASE: bookyourcoach_prod" \
          "DB_USERNAME: byc_app" \
          "LOG_CHANNEL: stderr" \
          > "$ENV_FILE"

        migrate_job_flags=(
          --image="$IMAGE"
          --region=${{ env.GCP_REGION }}
          --project=${{ env.GCP_PROJECT }}
          --command="php"
          --args="artisan,migrate,--force"
          --service-account="bookyourcoach-run@${{ env.GCP_PROJECT }}.iam.gserviceaccount.com"
          --vpc-connector="projects/${{ env.GCP_PROJECT }}/locations/${{ env.GCP_REGION }}/connectors/premedica-connector"
          --vpc-egress=private-ranges-only
          --set-cloudsql-instances="${{ env.GCP_PROJECT }}:${{ env.GCP_REGION }}:ll-it-mysql"
          --env-vars-file="$ENV_FILE"
          --set-secrets="APP_KEY=bookyourcoach-app-key-prod:latest,DB_PASSWORD=bookyourcoach-database-url-password:latest"
          --quiet
        )

        if gcloud run jobs describe ${{ env.MIGRATE_JOB }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} 2>/dev/null; then
          gcloud run jobs update ${{ env.MIGRATE_JOB }} "${migrate_job_flags[@]}"
        else
          gcloud run jobs create ${{ env.MIGRATE_JOB }} "${migrate_job_flags[@]}"
        fi

        gcloud run jobs execute ${{ env.MIGRATE_JOB }} \
          --region=${{ env.GCP_REGION }} \
          --project=${{ env.GCP_PROJECT }} \
          --wait \
          --quiet

  # ─── 5. Tests post-déploiement ────────────────────────────────────────────
  test-deployment:
    name: 🧪 Tests Post-Déploiement
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: 🔑 Auth GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY_BYC }}

    - name: ⚙️ Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: 🧪 Health checks
      run: |
        API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
          --region=${{ env.GCP_REGION }} \
          --project=${{ env.GCP_PROJECT }} \
          --format='value(status.url)')
        WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
          --region=${{ env.GCP_REGION }} \
          --project=${{ env.GCP_PROJECT }} \
          --format='value(status.url)')

        echo "API : $API_URL"
        echo "Web : $WEB_URL"

        # Health endpoint backend
        http_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_URL/api/health" || echo "000")
        [ "$http_code" = "200" ] && echo "✅ API health OK" \
                                 || echo "⚠️  API health HTTP $http_code"

        # Auth sécurisée (token invalide → 401)
        admin_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
          -H "Authorization: Bearer invalid" "$API_URL/api/admin/dashboard" || echo "000")
        [ "$admin_code" = "401" ] && echo "✅ Routes admin sécurisées" \
                                  || echo "⚠️  Routes admin HTTP $admin_code"

        # Frontend
        web_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$WEB_URL" || echo "000")
        [ "$web_code" = "200" ] && echo "✅ Frontend OK" \
                                || echo "⚠️  Frontend HTTP $web_code"

  # ─── 6. Notification ──────────────────────────────────────────────────────
  notify:
    name: 📧 Notification
    runs-on: ubuntu-latest
    needs: [prepare, build-images, deploy, test-deployment]
    if: always()

    steps:
    - name: ✅ Succès
      if: needs.deploy.result == 'success' && needs.test-deployment.result == 'success'
      run: |
        echo "🎉 DÉPLOIEMENT GCP RÉUSSI !"
        echo "  API  : https://bookyourcoach-api-prod-a7ako2njea-od.a.run.app"
        echo "  Web  : https://bookyourcoach-web-prod-a7ako2njea-od.a.run.app"
        echo "  Tag  : ${{ needs.prepare.outputs.image_tag }}"
        echo "  Date : $(date)"

    - name: ❌ Échec
      if: needs.deploy.result == 'failure' || needs.test-deployment.result == 'failure'
      run: |
        echo "❌ ÉCHEC DU DÉPLOIEMENT"
        echo "Consultez les logs du job 'deploy' ou 'test-deployment' ci-dessus."
        exit 1
