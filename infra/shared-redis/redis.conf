# Redis 7 — VM partagée e2-micro (~1 Go RAM)
# Sécurité réseau : pare-feu VM (pas d'accès public 6379)

bind 0.0.0.0
protected-mode yes
port 6379

# ~384 Mo pour Redis, marge OS/conteneur sur e2-micro
maxmemory 384mb
maxmemory-policy allkeys-lru

# Durabilité légère (sessions + queues)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logs
loglevel notice

# Perf
tcp-keepalive 300
timeout 0
