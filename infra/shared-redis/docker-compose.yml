# Redis partagé — VM Compute Engine e2-micro (ou toute VM dédiée)
# Déploiement : copier ce dossier sur la VM, configurer .env, puis docker compose up -d
#
# Isolation multi-apps : chaque application Laravel utilise REDIS_PREFIX (APP_NAME)
# et des numéros de DB distincts (REDIS_DB / REDIS_CACHE_DB).

services:
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    ports:
      # Limiter l'exposition : pare-feu VM → autoriser uniquement les IP applicatives
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
    driver: local
